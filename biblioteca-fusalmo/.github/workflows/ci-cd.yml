name: CI/CD — Biblioteca Fusalmo

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. BUILD ────────────────────────────────────────────────
  build:
    name: Build y configurar entorno
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar PHP 8.x
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring, json
          coverage: none

      - name: Instalar dependencias (Composer)
        run: composer install --no-progress --prefer-dist

      - name: Crear archivo .env
        run: |
          echo "DB_HOST=${{ secrets.DB_HOST }}"       >  .env
          echo "DB_USER=${{ secrets.DB_USER }}"       >> .env
          echo "DB_PASS=${{ secrets.DB_PASS }}"       >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}"       >> .env
          echo "APP_ENV=testing"                      >> .env

  # ── 2. TEST ─────────────────────────────────────────────────
  test:
    name: Pruebas unitarias (PHPUnit)
    runs-on: ubuntu-latest
    needs: build

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: biblioteca_fusalmo_test
        ports: ['3306:3306']
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Configurar PHP 8.x
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, mbstring

      - name: Instalar dependencias
        run: composer install --no-progress --prefer-dist

      - name: Crear esquema de prueba
        run: mysql -h 127.0.0.1 -u root -proot biblioteca_fusalmo_test < config/schema.sql

      - name: Ejecutar PHPUnit
        run: vendor/bin/phpunit --configuration phpunit.xml --testdox
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASS: root
          DB_NAME: biblioteca_fusalmo_test

  # ── 3. DEPLOY ───────────────────────────────────────────────
  deploy:
    name: Despliegue al servidor
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Desplegar vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/biblioteca-fusalmo
            git pull origin main
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force || mysql -u $DB_USER -p$DB_PASS $DB_NAME < config/schema.sql
            echo "✅ Despliegue completado — $(date)"
